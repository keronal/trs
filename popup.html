<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRS 智能翻译</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- 头部 -->
    <header class="popup-header">
      <div class="logo">
        <span class="logo-icon">🌐</span>
        <h1>TRS 智能翻译</h1>
      </div>
      <span class="version">v1.0</span>
    </header>

    <!-- 状态指示 -->
    <div class="status-bar" id="statusBar">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">就绪</span>
    </div>

    <!-- API Key 提示 -->
    <div class="api-warning" id="apiWarning" style="display:none;">
      <span>⚠️</span>
      <span>请先配置 DeepSeek API Key</span>
      <a href="#" id="goToOptions">前往设置</a>
    </div>

    <!-- 主控制区 -->
    <div class="control-section">
      <button class="btn-primary btn-translate" id="btnTranslate">
        <span class="btn-icon">📖</span>
        <span class="btn-text" id="btnTranslateText">翻译本页</span>
      </button>

      <div class="btn-row">
        <button class="btn-secondary" id="btnRemove">
          <span>🗑️</span> 清除译文
        </button>
        <button class="btn-secondary" id="btnRetranslate">
          <span>🔄</span> 重新翻译
        </button>
      </div>
    </div>

    <!-- 语言选择 -->
    <div class="setting-section">
      <label class="setting-label" for="targetLang">目标语言</label>
      <select class="select-lang" id="targetLang">
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁体中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="es">Español</option>
        <option value="ru">Русский</option>
        <option value="pt">Português</option>
        <option value="ar">العربية</option>
        <option value="th">ไทย</option>
        <option value="vi">Tiếng Việt</option>
      </select>
    </div>

    <!-- 底部 -->
    <footer class="popup-footer">
      <a href="#" id="openOptions" class="footer-link">
        <span>⚙️</span> 更多设置
      </a>
      <span class="footer-brand">Powered by DeepSeek</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
